name: lover_cl
description: Club venue and guest MVP built with Flutter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_naver_map: ^1.4.4
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  solana_mobile_client: 0.1.2
  http: ^1.2.0
  crypto: ^3.0.0
  solana: ^0.31.0
  record: 5.0.4
  path_provider: ^2.1.4

dependency_overrides:
  record_platform_interface: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - config/local.json
