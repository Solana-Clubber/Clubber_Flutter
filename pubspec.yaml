name: lover_cl
description: Club venue and guest MVP built with Flutter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_naver_map: ^1.4.4
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  solana_mobile_client: 0.1.2
  http: ^1.2.1
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - config/local.json
